<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>THE BOSS — Breaking Event</title>
<meta property="og:title" content="THE BOSS — Breaking Event">

<style>
  :root{
    --rojo:#c31419;
    --rojo-claro:#e8262c;
    --negro:#0a0a0a;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    min-height:100vh;
    background:
      radial-gradient(circle at 50% 0%, #2a0d0e 0%, #0a0a0a 55%),
      var(--negro);
    color:#fff;
    font-family:"Arial Black","Helvetica Neue",Arial,sans-serif;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:32px 20px;
  }
  .wrap{width:100%;max-width:420px;text-align:center}

  .crown{font-size:34px;line-height:1;margin-bottom:6px;filter:drop-shadow(0 0 8px rgba(195,20,25,.8))}

  h1{
    font-size:clamp(38px,13vw,58px);
    letter-spacing:2px;
    line-height:.9;
    text-transform:uppercase;
    font-style:italic;
  }
  h1 .the{
    display:block;
    font-size:.42em;
    letter-spacing:8px;
    color:#e6e6e6;
    -webkit-text-stroke:0;
  }
  h1 .boss{
    display:block;
    color:var(--rojo-claro);
    text-shadow:
      0 0 18px rgba(195,20,25,.65),
      3px 3px 0 #6b0a0d;
  }
  .sub{
    margin-top:10px;
    font-size:13px;
    letter-spacing:4px;
    color:#cfcfcf;
    text-transform:uppercase;
  }
  .edicion{
    display:inline-block;
    margin-top:10px;
    padding:4px 14px;
    font-size:11px;
    letter-spacing:3px;
    border:1px solid var(--rojo);
    border-radius:99px;
    color:var(--rojo-claro);
  }

  .rule{
    height:2px;
    margin:26px auto 22px;
    background:linear-gradient(90deg,transparent,var(--rojo),transparent);
  }

  .links{display:flex;flex-direction:column;gap:14px}
  a.link{
    display:flex;
    align-items:center;
    gap:14px;
    padding:15px 18px;
    border-radius:14px;
    text-decoration:none;
    color:#fff;
    background:rgba(255,255,255,.05);
    border:1px solid rgba(255,255,255,.14);
    backdrop-filter:blur(6px);
    transition:transform .15s ease, border-color .15s ease, background .15s ease;
  }
  a.link:hover,a.link:active{
    transform:translateY(-2px);
    border-color:var(--rojo);
    background:rgba(195,20,25,.14);
  }
  .ico{
    width:40px;height:40px;flex:0 0 40px;
    border-radius:11px;
    display:flex;align-items:center;justify-content:center;
  }
  .ico svg{width:22px;height:22px;fill:#fff}
  .fb{background:#1877f2}
  .ig{background:linear-gradient(45deg,#f9ce34,#ee2a7b,#6228d7)}
  .tt{background:#000;border:1px solid #333}
  .txt{text-align:left;line-height:1.25}
  .txt .n{font-size:14px;letter-spacing:1.5px;text-transform:uppercase}
  .txt .h{font-size:12px;color:#a9a9a9;font-family:Arial,sans-serif;font-weight:400}
  .arrow{margin-left:auto;color:#777;font-size:18px}

  footer{margin-top:28px;font-size:10px;letter-spacing:3px;color:#666;text-transform:uppercase}
</style>
</head>
