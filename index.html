  .wrap{width:100%;max-width:420px;text-align:center;position:relative}

  .logo{
    width:100%; max-width:300px; height:auto; display:block; margin:0 auto;
    filter:drop-shadow(0 0 18px rgba(0,0,0,.95)) drop-shadow(0 4px 12px rgba(0,0,0,.9));
  }

  .meta{display:flex;gap:7px;justify-content:center;flex-wrap:wrap;margin-top:16px}
  .badge{
    padding:6px 13px; font-size:10px; letter-spacing:2px; text-transform:uppercase;
    border:1px solid rgba(34,211,238,.7); border-radius:99px; color:#e8feff;
    background:rgba(34,211,238,.12); white-space:nowrap;
    backdrop-filter:blur(3px);
  }
  .badge.violet{border-color:rgba(139,92,246,.7);background:rgba(139,92,246,.14);color:#f0eaff}
  .badge.ghost{border-color:rgba(255,255,255,.3);background:rgba(255,255,255,.06);color:#ddd}

  .rule{height:2px;margin:24px auto 18px;background:linear-gradient(90deg,transparent,var(--cyan),var(--violeta),transparent)}
  .escanea{font-size:10px;letter-spacing:4px;color:#8f8f96;text-transform:uppercase;margin-bottom:16px}

  .links{display:flex;flex-direction:column;gap:12px}
  a.link{
    display:flex; align-items:center; gap:13px; padding:14px 16px; border-radius:14px;
    text-decoration:none; color:#fff;
    background:rgba(12,12,14,.86);
    border:1px solid rgba(255,255,255,.13);
    box-shadow:0 6px 20px rgba(0,0,0,.7);
    backdrop-filter:blur(6px);
    transition:transform .16s ease, border-color .16s ease, background .16s ease;
  }
  a.link:hover,a.link:active{transform:translateY(-2px);border-color:var(--cyan);background:rgba(34,211,238,.14)}
  .ico{width:38px;height:38px;flex:0 0 38px;border-radius:10px;display:flex;align-items:center;justify-content:center}
  .ico svg{width:21px;height:21px;fill:#fff}
  .fb{background:#1877f2}
  .ig{background:linear-gradient(45deg,#f9ce34,#ee2a7b,#6228d7)}
  .tt{background:#000;border:1px solid #3a3a3a}
  .txt{text-align:left;line-height:1.3;min-width:0}
  .txt .n{font-size:13px;letter-spacing:1.4px;text-transform:uppercase}
  .txt .h{font-size:11.5px;color:#a5a5ad;font-family:Arial,Helvetica,sans-serif;font-weight:400}
  .arrow{margin-left:auto;color:#6d6d75;font-size:19px;flex:0 0 auto}
a.cta{
  display:block; margin:0 0 16px; padding:16px 18px; border-radius:14px;
  text-decoration:none; color:#0a0a0b;
  font-size:14px; letter-spacing:2.5px; text-transform:uppercase;
  background:linear-gradient(90deg,var(--cyan),var(--violeta));
  box-shadow:0 6px 24px rgba(34,211,238,.35);
  transition:transform .16s ease, box-shadow .16s ease;
}
a.cta:hover,a.cta:active{
  transform:translateY(-2px);
  box-shadow:0 10px 30px rgba(139,92,246,.45);
}
  footer{margin-top:24px;font-size:9px;letter-spacing:2.5px;color:#5e5e66;text-transform:uppercase}

  @media (max-width:360px){
    .logo{max-width:250px}
    .txt .n{font-size:12px}
    .txt .h{font-size:11px}
  }
</style>
</head>
